<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPE Benefits by Profession</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  h1 { font-size: 2.2rem; color: #333; margin-bottom: 8px; }
  .subtitle { color: #777; font-size: 1.15rem; margin-bottom: 30px; }
  .progress { display: flex; gap: 8px; margin-bottom: 30px; }
  .progress-dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; cursor: pointer; transition: background 0.3s, transform 0.2s; }
  .progress-dot.active { background: #500000; transform: scale(1.2); }
  .progress-dot.viewed { background: #9a8a8a; }
  .card-container { perspective: 1000px; width: 100%; max-width: 620px; height: 400px; cursor: pointer; }
  .card { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .card-front { background: #500000; color: #fff; }
  .card-front .term { font-size: 2.2rem; font-weight: 600; line-height: 1.4; }
  .card-front .hint { font-size: 1rem; opacity: 0.5; margin-top: 24px; }
  .card-back { background: #fff; color: #333; transform: rotateY(180deg); border: 2px solid #e0e0e0; justify-content: flex-start; padding: 32px 36px; overflow-y: auto; }
  .card-back .back-title { font-size: 1.2rem; font-weight: 700; color: #500000; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; width: 100%; }
  .card-back .bullets { list-style: none; text-align: left; width: 100%; }
  .card-back .bullets li { font-size: 1.1rem; line-height: 1.55; color: #444; padding: 8px 0 8px 20px; position: relative; border-bottom: 1px solid #f0f0f0; }
  .card-back .bullets li:last-child { border-bottom: none; }
  .card-back .bullets li::before { content: ''; position: absolute; left: 0; top: 14px; width: 8px; height: 8px; background: #500000; border-radius: 50%; }
  .nav { display: flex; align-items: center; gap: 20px; margin-top: 30px; }
  .nav-btn { background: #fff; border: 2px solid #ddd; border-radius: 50%; width: 48px; height: 48px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: #555; }
  .nav-btn:hover { border-color: #500000; color: #500000; background: #faf5f5; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; border-color: #ddd; color: #ccc; background: #fff; }
  .counter { font-size: 1.1rem; color: #777; min-width: 60px; text-align: center; }
  @media (max-width: 600px) { .card-container { height: 380px; } .card-front .term { font-size: 1.8rem; } .card-back .bullets li { font-size: 1rem; } }
</style>
</head>

<style>

  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  h1 { font-size: 1.6rem; color: #333; margin-bottom: 8px; }
  .subtitle { color: #777; font-size: 0.95rem; margin-bottom: 30px; }
  .progress { display: flex; gap: 8px; margin-bottom: 30px; }
  .progress-dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; cursor: pointer; transition: background 0.3s, transform 0.2s; }
  .progress-dot.active { background: #500000; transform: scale(1.2); }

  .card-front .hint { font-size: 0.8rem; opacity: 0.5; margin-top: 24px; }

  .card-back .back-title { font-size: 1rem; font-weight: 700; color: #500000; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; width: 100%; }
  .card-back .bullets { list-style: none; text-align: left; width: 100%; }
  .card-back .bullets li { font-size: 0.95rem; line-height: 1.55; color: #444; padding: 8px 0 8px 20px; position: relative; border-bottom: 1px solid #f0f0f0; }
  .card-back .bullets li:last-child { border-bottom: none; }

  @media (max-width: 600px) { .card-container { height: 380px; } .card-front .term { font-size: 1.3rem; } .card-back .bullets li { font-size: 0.88rem; } }
</style>
</head>
<body>
<h1>IPE Benefits by Profession</h1>
<p class="subtitle">Click each card to see how IPE benefits each discipline</p>
<div class="progress" id="progress"></div>
<div class="card-container" id="cardContainer" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-front">
      <div class="term" id="termText"></div>
      <div class="hint">Click to flip</div>
    </div>
    <div class="card-face card-back">
      <div class="back-title" id="backTitle"></div>
      <ul class="bullets" id="bulletList"></ul>
    </div>
  </div>
</div>
<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="event.stopPropagation(); navigate(-1)">&#8592;</button>
  <span class="counter" id="counter"></span>
  <button class="nav-btn" id="nextBtn" onclick="event.stopPropagation(); navigate(1)">&#8594;</button>
</div>
<script>
  const cards=[{title:"Dental Students",bullets:["IPE helps dental students understand the systemic links between oral health and general health, leading to more holistic patient management.","IPE helps dental students improve diagnostic accuracy by collaborating with other healthcare professionals, leading to more comprehensive patient assessments."]},{title:"Medical Students",bullets:["IPE provides medical students with a broader understanding of healthcare systems and the roles of various professionals, which is crucial for effective healthcare delivery.","IPE enhances medical students' clinical competence by exposing them to diverse perspectives and collaborative problem-solving approaches.","Medical students in IPE programs gain skills in coordinating patient care across different specialties, leading to more efficient and effective treatment plans."]},{title:"Nursing Students",bullets:["Nursing students benefit from IPE by learning strategies that promote patient safety, such as effective communication and teamwork, which are critical in preventing medical errors.","IPE fosters collaborative clinical decision-making, where nursing students learn to integrate input from various healthcare professionals. This leads to more comprehensive and informed decisions, ultimately improving patient outcomes."]},{title:"Pharmacy Students",bullets:["Pharmacy students in IPE programs develop better skills in medication management by collaborating with other healthcare providers, leading to safer and more effective patient care.","IPE helps pharmacy students improve their patient counseling skills by learning from and with other healthcare professionals."]},{title:"Public Health Students",bullets:["Public health students benefit from IPE by learning to integrate multiple disciplines in their approach to health promotion and disease prevention, leading to more effective public health interventions.","IPE prepares public health students to work collaboratively with other health professionals, improving community health outcomes through coordinated efforts.","IPE equips public health students with the skills to develop and advocate for health policies that address the needs of diverse populations through a collaborative approach."]}];
  let current=0,isFlipped=false;const viewed=new Set();
  function render(){const c=cards[current];document.getElementById('termText').textContent=c.title;document.getElementById('backTitle').textContent=c.title;document.getElementById('counter').textContent=(current+1)+' / '+cards.length;document.getElementById('prevBtn').disabled=current===0;document.getElementById('nextBtn').disabled=current===cards.length-1;const list=document.getElementById('bulletList');list.innerHTML='';c.bullets.forEach(b=>{const li=document.createElement('li');li.textContent=b;list.appendChild(li)});isFlipped=false;document.getElementById('card').classList.remove('flipped');const progress=document.getElementById('progress');progress.innerHTML='';cards.forEach((_,i)=>{const dot=document.createElement('div');dot.className='progress-dot';if(i===current)dot.classList.add('active');else if(viewed.has(i))dot.classList.add('viewed');dot.onclick=(e)=>{e.stopPropagation();current=i;render()};progress.appendChild(dot)});viewed.add(current)}
  function flipCard(){isFlipped=!isFlipped;document.getElementById('card').classList.toggle('flipped',isFlipped)}
  function navigate(dir){const next=current+dir;if(next>=0&&next<cards.length){current=next;render()}}
  document.addEventListener('keydown',(e)=>{if(e.key==='ArrowLeft')navigate(-1);else if(e.key==='ArrowRight')navigate(1);else if(e.key===' '||e.key==='Enter'){e.preventDefault();flipCard()}});
  render();
</script>
</body>
</html>
